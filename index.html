<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./styles/responsive.css">
    <link rel="icon" href="./assets/icons/pokeball.png">
    <script src="script.js"></script>
    <script src="./scripts/api.js"></script>
    <script src="./scripts/dialog.js"></script>
    <script src="./scripts/render.js"></script>
    <script src="./scripts/serch.js"></script>
    <script src="./scripts/template.js"></script>
    <script src="./scripts/object.js"></script>
</head>

<body onload="loadPokemon()">
    <header>
        <div class="header-content-wrapper">
        <div class="headline-wrapper">
            <img src="./assets/img/pokemon-seeklogo.png" alt="">
        </div>
        <div class="search-container">
            <input data-id="search-input" type="text" placeholder="Search Pokémon" oninput="filterPokemon(this.value)">
            <!-- <button class="search-btn">Search</button> -->
        </div>
        </div>
    </header>
    <main data-id="content">
            <section id="pokemon-container" class="pokemon-container"></section>
            <div class="load-more-btn-wrapper">
                <button data-id="load-more-button" class="load-more-btn" onclick="loadPokemon()">Load More</button>
            </div>
            <dialog data-id="dialog" id="pokemon-dialog"></dialog>
    </main>
    <footer>
        <div></div>
    </footer>
    <div id="loading-spinner" class="spinner-wrapper d-none">
        <div class="spinner"></div>
    </div>
</body>

</html>
